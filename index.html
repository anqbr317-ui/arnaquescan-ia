<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ArnaqueScan IA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 15px #ccc;
    }
    h1 { color: #1e40af; }
    input {
      padding: 12px;
      width: 80%;
      margin: 15px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>ArnaqueScan IA</h1>
    <p>Analysez un site web pour détecter les risques potentiels.</p>

    <input type="text" placeholder="Entrez l'adresse du site">
    <br>
    <button>Analyser</button>

    <p><strong>Résultat :</strong> Analyse bientôt disponible.</p>
  </div>
</body>
</html>
